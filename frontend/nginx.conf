server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # SPA fallback: any non-asset path serves index.html.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # API proxy. Strips the /api prefix so /api/chat/stream → /chat/stream on
  # the FastAPI container. SSE-specific settings keep the stream open and
  # forward chunks immediately.
  #
  # Uses the fully-qualified container name `conv-agent-api` — NOT the bare
  # docker-compose service name `api` — because in a multi-app deploy the
  # frontend shares a network with other apps that may also have a service
  # called `api` (Docker's embedded DNS would then round-robin the two, and
  # login requests silently authenticate against the wrong tenant).
  location /api/ {
    proxy_pass http://conv-agent-api:8000/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # SSE-friendly knobs
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 1h;
    proxy_send_timeout 1h;
    chunked_transfer_encoding on;
  }
}
