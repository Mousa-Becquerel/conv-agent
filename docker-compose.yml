services:
  postgres:
    image: postgres:16-alpine
    container_name: conv_agent_postgres
    ports:
      - "5433:5432"   # 5433 on host avoids clashing with any local 5432
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-conv_agent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-conv_agent_dev}
      POSTGRES_DB: ${POSTGRES_DB:-conv_agent}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-conv_agent} -d ${POSTGRES_DB:-conv_agent}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - conv-agent-net
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: conv_agent_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    healthcheck:
      test: ["CMD-SHELL", "timeout 3 bash -c '</dev/tcp/localhost/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - conv-agent-net

  indexer:
    build:
      context: ./indexer
      dockerfile: Dockerfile
    container_name: conv_agent_indexer
    volumes:
      - ./sample:/data/sample:ro
      - ./out:/app/out
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - QDRANT_URL=${QDRANT_URL:-http://qdrant:6333}
      - COLLECTION_NAME=${COLLECTION_NAME:-conv_agent_chunks}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-text-embedding-3-large}
      - SAMPLE_DIR=/data/sample
      - OUT_DIR=/app/out
    networks:
      - conv-agent-net

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: conv_agent_api
    ports:
      - "8002:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - QDRANT_URL=${QDRANT_URL:-http://qdrant:6333}
      - COLLECTION_NAME=${COLLECTION_NAME:-conv_agent_chunks}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-text-embedding-3-large}
      - LLM_MODEL=${LLM_MODEL:-gpt-4.1-mini}
      - DATABASE_URL=${DATABASE_URL:-postgresql+psycopg://conv_agent:conv_agent_dev@postgres:5432/conv_agent}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ACCESS_TOKEN_EXPIRE_MINUTES=${JWT_ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      - JWT_REFRESH_TOKEN_EXPIRE_DAYS=${JWT_REFRESH_TOKEN_EXPIRE_DAYS:-14}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:5173}
      - CHAT_RATE_LIMIT=${CHAT_RATE_LIMIT:-30/hour}
      - LOGIN_RATE_LIMIT=${LOGIN_RATE_LIMIT:-10/minute}
      - TRANSCRIBE_RATE_LIMIT=${TRANSCRIBE_RATE_LIMIT:-10/hour}
      - TRANSCRIBE_MODEL=${TRANSCRIBE_MODEL:-gpt-4o-mini-transcribe}
      - TRANSCRIBE_LANGUAGE=${TRANSCRIBE_LANGUAGE:-it}
      - LOG_FORMAT=${LOG_FORMAT:-pretty}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - SENTRY_DSN=${SENTRY_DSN:-}
      - SENTRY_ENVIRONMENT=${SENTRY_ENVIRONMENT:-development}
      - SENTRY_TRACES_SAMPLE_RATE=${SENTRY_TRACES_SAMPLE_RATE:-0.0}
    depends_on:
      qdrant:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - conv-agent-net
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_SENTRY_DSN: ${VITE_SENTRY_DSN:-}
        VITE_SENTRY_ENVIRONMENT: ${VITE_SENTRY_ENVIRONMENT:-development}
        VITE_SENTRY_RELEASE: ${VITE_SENTRY_RELEASE:-}
    container_name: conv_agent_frontend
    ports:
      - "3000:80"
    depends_on:
      - api
    networks:
      - conv-agent-net
    restart: unless-stopped

volumes:
  qdrant_storage:
    driver: local
  postgres_data:
    driver: local

networks:
  conv-agent-net:
    driver: bridge
